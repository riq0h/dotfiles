# シェル
shell:
  program: /usr/bin/zsh
  args:
    - --login

# カーソル
cursor:
  text: '#ffffff'
  cursor: '#00ff00'
  style:
    shape: Block
    blinking: On
  unfocused_hollow: false
  blink_interval: 470

# タブスペース
tabspaces: 4

# フォント
font:
  size: 13.5
  normal:
    family: 'Ricty'
    style: Regular
  bold:
    family: 'Ricty'
    style: Bold
  italic:
    family: 'Ricty'
    style: Italic
  bold_italic:
    family: 'Ricty'
    style: Bold Italic

# ウインドウ
window:
  dimensions:
          columms: 120
          line: 100
  decorations: full

# 透過
background_opacity: 0.99

# 環境変数
env:
  TERM: alacritty

# Base16 Eighties 256 - alacritty color config
# Chris Kempson (http://chriskempson.com)
colors:
  # Default colors
  primary:
    background: '0x2d2d2d'
    foreground: '0xd3d0c8'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x2d2d2d'
    cursor: '0xd3d0c8'

  # Normal colors
  normal:
    black:   '0x2d2d2d'
    red:     '0xf2777a'
    green:   '0x99cc99'
    yellow:  '0xffcc66'
    blue:    '0x6699cc'
    magenta: '0xcc99cc'
    cyan:    '0x66cccc'
    white:   '0xd3d0c8'

  # Bright colors
  bright:
    black:   '0x747369'
    red:     '0xf2777a'
    green:   '0x99cc99'
    yellow:  '0xffcc66'
    blue:    '0x6699cc'
    magenta: '0xcc99cc'
    cyan:    '0x66cccc'
    white:   '0xf2f0ec'

  indexed_colors:
    - { index: 16, color: '0xf99157' }
    - { index: 17, color: '0xd27b53' }
    - { index: 18, color: '0x393939' }
    - { index: 19, color: '0x515151' }
    - { index: 20, color: '0xa09f93' }
    - { index: 21, color: '0xe8e6df' }

